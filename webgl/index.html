<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Protein Graph WebGL Showcase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header">
    <div class="title">Protein Graph — Structure ↔ Embedding (WebGL)</div>
    <div class="meta" id="meta"></div>
  </div>

  <div id="controls">
    <label>View
      <select id="viewMode">
        <option value="both">Both</option>
        <option value="struct">Structure Only</option>
        <option value="embed">Embedding Only</option>
      </select>
    </label>
    <label>Point Size
      <input id="pointSize" type="range" min="1" max="8" step="1" value="3" />
    </label>
    <label>Edge Opacity
      <input id="edgeOpacity" type="range" min="0" max="1" step="0.05" value="0.15" />
    </label>
    <label><input type="checkbox" id="showEdges" checked /> Show edges</label>
    <button id="reset">Reset Camera</button>
  </div>

  <div id="container">
    <div class="panel">
      <div class="panel-title">Structure Graph</div>
      <canvas id="canvasStruct"></canvas>
    </div>
    <div class="panel">
      <div class="panel-title">Embedding Space (PCA‑3D)</div>
      <canvas id="canvasEmbed"></canvas>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
